name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: zip, pdo, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --no-progress

      - name: Run Tests
        run: vendor/bin/phpunit
